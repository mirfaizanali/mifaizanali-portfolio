<section class="education" id="education" [class.visible]="visible()">
  <div class="container">
    <h2 class="section-title">Education</h2>

    <div class="timeline">
      <div class="timeline-line"></div>

      @for (item of entries; track item.title; let i = $index) {
        <div class="timeline-item fade-up" [style.transition-delay]="(i * 0.2) + 's'">
          <div class="timeline-dot"></div>
          <div class="timeline-card" [appTilt3d]="8">
            <span class="badge">
              {{ item.type === 'degree' ? 'Degree' : 'School' }}
            </span>
            <h3>{{ item.title }}</h3>
            <p class="place">{{ item.place }}</p>
            <p class="period">{{ item.period }}</p>
            @if (item.detail) {
              <p class="detail">{{ item.detail }}</p>
            }
            @if (item.score) {
              <span class="score">{{ item.score }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
